{% extends "base.html" %}

{% block content %}
<h2 class="titulo-pagina">Novo registro pedagógico</h2>

<form method="POST" class="formulario">
    <div class="linha-numero">
        <strong>Nº ________/2026</strong>
    </div>

    <div class="grid-2">
        <div>
            <label>Turma</label>
            <select id="turmaFiltro">
                <option value="">Todas</option>
                {% for turma in turmas %}
                    <option value="{{ turma }}">{{ turma }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Estudante</label>
            <select name="estudante_id" id="estudanteSelect" required>
                <option value="">Selecione o estudante</option>
                {% for estudante in estudantes %}
                    <option value="{{ estudante.id }}" data-turma="{{ estudante.turma }}">
                        {{ estudante.nome }} - {{ estudante.turma }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="info-estudante" id="infoEstudante">
        <p><strong>Turma:</strong> <span id="infoTurma">-</span></p>
        <p><strong>Responsável:</strong> <span id="infoResponsavel">-</span></p>
    </div>

    <div class="grid-2">
        <div>
            <label>Data do registro</label>
            <input type="date" name="data_registro" value="{{ data_atual }}" required>
        </div>
        <div>
            <label>Hora do registro</label>
            <input type="time" name="hora_registro" value="{{ hora_atual }}" required>
        </div>
    </div>

    <div class="grid-2">
        <div>
            <label>Tipo de relatório</label>
            <select name="tipo_relatorio" id="tipoRelatorio" required>
                <option value="">Selecione</option>
                {% for tipo in config.tipos_relatorio %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Professor(a) / Pedagogo(a)</label>
            <input type="text" name="profissional" required>
        </div>
    </div>

    <div class="grid-2">
        <div>
            <label>Disciplina</label>
            <select name="disciplina" required>
                <option value="">Selecione</option>
                {% for disciplina in config.disciplinas %}
                    <option value="{{ disciplina }}">{{ disciplina }}</option>
                {% endfor %}
            </select>
        </div>
        <div></div>
    </div>

    <div id="secaoDificuldades" class="secao-check" style="display:none;">
        <h3>Dificuldades de aprendizagem</h3>
        <div class="checks" id="dificuldadesContainer"></div>
    </div>

    <div id="secaoComportamentais" class="secao-check" style="display:none;">
        <h3>Questões comportamentais</h3>
        <div class="checks" id="comportamentaisContainer"></div>
    </div>

    <div id="secaoIntervencoes" class="secao-check" style="display:none;">
        <h3>Intervenções realizadas</h3>
        <div class="checks" id="intervencoesContainer"></div>
    </div>

    <div id="secaoRespostas" class="secao-check" style="display:none;">
        <h3>Resposta do estudante</h3>
        <div class="checks" id="respostasContainer"></div>
    </div>

    <div id="secaoEncaminhamentos" class="secao-check" style="display:none;">
        <h3>Encaminhamentos</h3>
        <div class="checks" id="encaminhamentosContainer"></div>
    </div>

    <label>Observação complementar</label>
    <textarea name="observacao_livre" placeholder="Campo opcional para complemento do relatório."></textarea>

    <div class="secao-check">
        <h3>Assinaturas</h3>
        <div class="grid-3">
            <div>
                <label>Nome para assinatura do(a) estudante</label>
                <input type="text" name="assinatura_estudante">
            </div>
            <div>
                <label>Nome para assinatura do(a) professor(a)/pedagogo(a)</label>
                <input type="text" name="assinatura_profissional">
            </div>
            <div>
                <label>Nome para assinatura do responsável</label>
                <input type="text" name="assinatura_responsavel">
            </div>
        </div>
    </div>

    <button type="submit" class="btn">Salvar registro</button>
</form>

<script>
const estudanteSelect = document.getElementById("estudanteSelect");
const turmaFiltro = document.getElementById("turmaFiltro");
const infoTurma = document.getElementById("infoTurma");
const infoResponsavel = document.getElementById("infoResponsavel");
const tipoRelatorio = document.getElementById("tipoRelatorio");

const secaoDificuldades = document.getElementById("secaoDificuldades");
const secaoComportamentais = document.getElementById("secaoComportamentais");
const secaoIntervencoes = document.getElementById("secaoIntervencoes");
const secaoRespostas = document.getElementById("secaoRespostas");
const secaoEncaminhamentos = document.getElementById("secaoEncaminhamentos");

const dificuldadesContainer = document.getElementById("dificuldadesContainer");
const comportamentaisContainer = document.getElementById("comportamentaisContainer");
const intervencoesContainer = document.getElementById("intervencoesContainer");
const respostasContainer = document.getElementById("respostasContainer");
const encaminhamentosContainer = document.getElementById("encaminhamentosContainer");

const todasOpcoes = Array.from(estudanteSelect.options);
const configData = {{ config | tojson }};

function atualizarInfoEstudante() {
    const id = estudanteSelect.value;
    if (!id) {
        infoTurma.textContent = "-";
        infoResponsavel.textContent = "-";
        return;
    }

    fetch(`/api/estudante/${id}`)
        .then(r => r.json())
        .then(data => {
            infoTurma.textContent = data.turma || "-";
            infoResponsavel.textContent = data.responsavel || "-";
        })
        .catch(() => {
            infoTurma.textContent = "-";
            infoResponsavel.textContent = "-";
        });
}

function filtrarPorTurma() {
    const turma = turmaFiltro.value;
    estudanteSelect.innerHTML = '<option value="">Selecione o estudante</option>';

    todasOpcoes.forEach(op => {
        if (!op.value) return;
        if (!turma || op.dataset.turma === turma) {
            estudanteSelect.appendChild(op.cloneNode(true));
        }
    });

    estudanteSelect.value = "";
    atualizarInfoEstudante();
}

function renderizarOpcoes(container, itens, nomeCampo, tipoInput) {
    container.innerHTML = "";

    if (!Array.isArray(itens) || itens.length === 0) {
        container.innerHTML = "<p>Nenhuma opção disponível.</p>";
        return;
    }

    itens.forEach(item => {
        const label = document.createElement("label");
        label.className = "check-item";

        const input = document.createElement("input");
        input.type = tipoInput;
        input.name = nomeCampo;
        input.value = item;

        if (tipoInput === "radio") {
            input.required = true;
        }

        label.appendChild(input);
        label.appendChild(document.createTextNode(" " + item));
        container.appendChild(label);
    });
}

function limparSecoes() {
    secaoDificuldades.style.display = "none";
    secaoComportamentais.style.display = "none";
    secaoIntervencoes.style.display = "none";
    secaoRespostas.style.display = "none";
    secaoEncaminhamentos.style.display = "none";

    dificuldadesContainer.innerHTML = "";
    comportamentaisContainer.innerHTML = "";
    intervencoesContainer.innerHTML = "";
    respostasContainer.innerHTML = "";
    encaminhamentosContainer.innerHTML = "";
}

function listaComFallback(obj, chaves, fallback = []) {
    for (const chave of chaves) {
        if (obj && Array.isArray(obj[chave]) && obj[chave].length > 0) {
            return obj[chave];
        }
    }
    return fallback;
}

function atualizarTipoRelatorio() {
    const valor = tipoRelatorio.value;
    limparSecoes();

    if (!valor) return;

    const pedag = configData.acompanhamento_pedagogico || {};
    const disc = configData.ocorrencia_disciplinar || {};

    if (valor === "Relatório de Acompanhamento Pedagógico") {
        secaoDificuldades.style.display = "block";
        secaoIntervencoes.style.display = "block";
        secaoRespostas.style.display = "block";
        secaoEncaminhamentos.style.display = "block";

        const dificuldades = listaComFallback(
            pedag,
            ["dificuldades_aprendizagem", "dificuldades"],
            configData.dificuldades || []
        );

        const intervencoes = listaComFallback(
            pedag,
            ["intervencoes_realizadas", "intervencoes"],
            configData.intervencoes || []
        );

        const respostas = listaComFallback(
            pedag,
            ["resposta_estudante", "respostas_aluno", "resposta_aluno"],
            configData.respostas_aluno || []
        );

        const encaminhamentos = listaComFallback(
            pedag,
            ["encaminhamentos"],
            configData.encaminhamentos || []
        );

        renderizarOpcoes(dificuldadesContainer, dificuldades, "dificuldades", "checkbox");
        renderizarOpcoes(intervencoesContainer, intervencoes, "intervencoes", "checkbox");
        renderizarOpcoes(respostasContainer, respostas, "resposta_aluno", "radio");
        renderizarOpcoes(encaminhamentosContainer, encaminhamentos, "encaminhamentos", "checkbox");
    }

    if (valor === "Relatório de Ocorrência Disciplinar") {
        secaoComportamentais.style.display = "block";
        secaoIntervencoes.style.display = "block";
        secaoRespostas.style.display = "block";
        secaoEncaminhamentos.style.display = "block";

        const comportamentais = listaComFallback(
            disc,
            ["questoes_comportamentais", "comportamentais"],
            configData.questoes_comportamentais || []
        );

        const intervencoes = listaComFallback(
            disc,
            ["intervencoes_realizadas", "intervencoes"],
            configData.intervencoes || []
        );

        const respostas = listaComFallback(
            disc,
            ["resposta_estudante", "respostas_aluno", "resposta_aluno"],
            configData.respostas_aluno || []
        );

        const encaminhamentos = listaComFallback(
            disc,
            ["encaminhamentos"],
            configData.encaminhamentos || []
        );

        renderizarOpcoes(comportamentaisContainer, comportamentais, "questoes_comportamentais", "checkbox");
        renderizarOpcoes(intervencoesContainer, intervencoes, "intervencoes", "checkbox");
        renderizarOpcoes(respostasContainer, respostas, "resposta_aluno", "radio");
        renderizarOpcoes(encaminhamentosContainer, encaminhamentos, "encaminhamentos", "checkbox");
    }
}

turmaFiltro.addEventListener("change", filtrarPorTurma);
estudanteSelect.addEventListener("change", atualizarInfoEstudante);
tipoRelatorio.addEventListener("change", atualizarTipoRelatorio);

document.addEventListener("DOMContentLoaded", () => {
    atualizarTipoRelatorio();
});
</script>
{% endblock %}
