<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Pedagógico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="topo-oficial">
            <div class="logo-bloco">
                <img src="{{ url_for('static', filename='logo_estado.png') }}" alt="Logo Estado do Paraná" class="logo-estado-topo">
            </div>

            <div class="titulo-oficial">
                <h1>ESTADO DO PARANÁ</h1>
                <h2>SECRETARIA DE ESTADO DA EDUCAÇÃO</h2>
                <h3>PARANÁ INTEGRAL</h3>
                <h4>ESCOLA ESTADUAL PADRE MANUEL DA NÓBREGA</h4>
            </div>

            <div class="logo-bloco">
                <img src="{{ url_for('static', filename='logo_escola.png') }}" alt="Logo da escola" class="logo-escola-topo">
            </div>
        </header>

        <nav class="menu-oficial">
            <a href="{{ url_for('index') }}">Início</a>
            <a href="{{ url_for('novo_registro') }}">Novo registro</a>
        </nav>

        <div class="acessibilidade">
            <button type="button" onclick="alternarModoEscuro()">🌙 Modo escuro</button>
            <button type="button" onclick="alternarBaixaVisao()">🔎 Baixa visão</button>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script>
        function alternarModoEscuro() {
            document.body.classList.toggle("modo-escuro");
            localStorage.setItem("modoEscuro", document.body.classList.contains("modo-escuro"));
        }

        function alternarBaixaVisao() {
            document.body.classList.toggle("baixa-visao");
            localStorage.setItem("baixaVisao", document.body.classList.contains("baixa-visao"));
        }

        window.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("modoEscuro") === "true") {
                document.body.classList.add("modo-escuro");
            }

            if (localStorage.getItem("baixaVisao") === "true") {
                document.body.classList.add("baixa-visao");
            }
        });
    </script>
</body>
</html>
